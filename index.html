<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊巡王爺｜線上擲聖杯</title>
<style>
*{
  margin:0;
  padding:0;
  font-family:標楷體,微軟正黑體;
  box-sizing:border-box;
}
body{
  background:#2c170f;
  color:#fff9e8;
  text-align:center;
  padding:35px 15px;
}
h1{
  color:#ffd266;
  font-size:36px;
  letter-spacing:6px;
  text-shadow:0 0 4px #b8882277;
  margin-bottom:16px;
}
.tip{
  font-size:18px;
  opacity:0.9;
  line-height:1.8;
  margin-bottom:60px;
}
.cup-wrap{
  display:flex;
  gap:40px;
  justify-content:center;
  margin:60px 0;
  height:180px;
  align-items:center;
  perspective:900px;
}
.cup{
  width:140px;
  height:140px;
  transform-origin:center center;
}
.cup img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  /* 支援透明PNG，消除多餘白底渲染問題 */
  background:transparent;
}
/* 3D翻轉拋擲動畫 */
.throw-animate{
  animation:cupFlip 0.7s cubic-bezier(0.26,0.46,0.44,0.95);
}
@keyframes cupFlip{
  0%{transform:translateY(0) rotateY(0deg)}
  25%{transform:translateY(-36px) rotateY(75deg) rotate(12deg)}
  50%{transform:translateY(14px) rotateY(-55deg) rotate(-10deg)}
  75%{transform:translateY(-22px) rotateY(42deg) rotate(7deg)}
  100%{transform:translateY(0) rotateY(0deg)}
}
.btns{
  margin:70px 0 40px;
}
.btns button{
  padding:18px 50px;
  font-size:20px;
  margin:0 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s ease;
}
#throwBtn{
  background:#d38f1f;
  color:#1a0e05;
  font-weight:bold;
}
#throwBtn:active{transform:scale(0.96)}
#resetBtn{
  background:#6b341d;
  color:#fff;
}
#resetBtn:active{transform:scale(0.96)}
.divider{
  width:100%;
  height:1px;
  background:#ffd67044;
  margin-bottom:40px;
}
.res-title{
  font-size:32px;
  color:#ffdd86;
  letter-spacing:4px;
}
.res-text{
  font-size:18px;
  margin:12px 0;
}
.count-text{
  margin-top:14px;
  color:#ffd266;
  font-size:17px;
}
/* 手機自適應 */
@media(max-width:480px){
  h1{font-size:26px;letter-spacing:3px}
  .cup{width:110px;height:110px}
  .btns button{padding:14px 32px;font-size:17px;margin:8px}
  .res-title{font-size:24px}
}
</style>
</head>
<body>
<h1>遊巡王爺 | 線上擲聖杯</h1>
<p class="tip">心中默念向遊巡王爺所求之事，再點擊擲筊<br>一陰一陽＝聖筊｜兩陽＝笑筊｜兩陰＝陰筊</p>

<div class="cup-wrap">
  <div id="cupLeftBox" class="cup">
    <img id="cupLeftImg" src="zheng_left.png" alt="左邊正杯">
  </div>
  <div id="cupRightBox" class="cup">
    <img id="cupRightImg" src="zheng_right.png" alt="右邊正杯">
  </div>
</div>

<div class="btns">
  <button id="throwBtn">擲聖杯問遊巡王爺</button>
  <button id="resetBtn">重新重置</button>
</div>

<div class="divider"></div>

<div class="result-block">
  <div class="res-title">等候向遊巡王爺擲筊</div>
  <div class="res-text"></div>
  <div class="count-text"></div>
</div>

<script>
const cupLeftBox = document.getElementById('cupLeftBox');
const cupRightBox = document.getElementById('cupRightBox');
const cupLeftImg = document.getElementById('cupLeftImg');
const cupRightImg = document.getElementById('cupRightImg');
const throwBtn = document.getElementById('throwBtn');
const resetBtn = document.getElementById('resetBtn');
const resTitle = document.querySelector('.res-title');
const resText = document.querySelector('.res-text');
const countText = document.querySelector('.count-text');
let throwTotal = 0;

// 沿用你現有圖片檔名，完全不用修改圖片
const ZHENG_LEFT = "zheng_left.png";
const ZHENG_RIGHT = "zheng_right.png";
const FAN_LEFT = "fan_left.png";
const FAN_RIGHT = "fan_right.png";

// 隨機 1=陽(無月牙正杯) 0=陰(帶月牙反杯)
function randomSide(){
  return Math.floor(Math.random() * 2);
}

// 三種筊對應遊巡王爺解文
function getJiaoText(a,b){
  if(a !== b){
    return {
      name:"聖筊",
      desc:"遊巡王爺應允，心中所求可行，可安心執行計畫"
    }
  }else if(a === 1 && b === 1){
    return {
      name:"笑筊",
      desc:"心意雜亂、稟述不清，請平靜心神，重新向遊巡王爺問事"
    }
  }else{
    return {
      name:"陰筊",
      desc:"遊巡王爺不允，此事不宜進行，建議暫緩、換方式再稟問"
    }
  }
}

// 切換左右筊杯圖片
function refreshCupImg(leftSide, rightSide){
  cupLeftImg.src = leftSide === 1 ? ZHENG_LEFT : FAN_LEFT;
  cupRightImg.src = rightSide === 1 ? ZHENG_RIGHT : FAN_RIGHT;
}

// 擲筊翻轉動畫
function doThrow(){
  throwBtn.disabled = true;
  throwTotal++;
  cupLeftBox.classList.add('throw-animate');
  cupRightBox.classList.add('throw-animate');

  setTimeout(()=>{
    let leftNum = randomSide();
    let rightNum = randomSide();
    refreshCupImg(leftNum, rightNum);
    let jiaoInfo = getJiaoText(leftNum, rightNum);
    resTitle.innerText = jiaoInfo.name;
    resText.innerText = jiaoInfo.desc;
    countText.innerText = `累計向遊巡王爺擲筊次數：${throwTotal}`;

    cupLeftBox.classList.remove('throw-animate');
    cupRightBox.classList.remove('throw-animate');
    throwBtn.disabled = false;
  },700)
}

// 重置回初始兩個正杯畫面
function resetAll(){
  throwTotal = 0;
  refreshCupImg(1, 1);
  resTitle.innerText = "等候向遊巡王爺擲筊";
  resText.innerText = "";
  countText.innerText = "";
}

throwBtn.addEventListener('click', doThrow);
resetBtn.addEventListener('click', resetAll);
</script>
</body>
</html>
