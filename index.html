<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊巡王爺｜線上擲聖杯</title>
<style>
*{margin:0;padding:0;font-family:標楷體,微軟正黑體}
body{background:#2c170f;color:#fff9e8;text-align:center;padding:35px 15px}
h1{color:#ffd266;font-size:30px;letter-spacing:3px}
.tip{margin:12px 0 40px;opacity:0.9}
.cup-wrap{
  display:flex;
  gap:45px;
  justify-content:center;
  margin:50px 0;
  height:170px;
  align-items:center;
  perspective:900px;
}
/* 【核心：筊杯形狀完全對應你的圖片】 */
.cup{
  width:105px;
  height:140px;
  /* 左側大弧形、右側垂直直邊，1:1還原圖片半月輪廓 */
  border-radius:70px 0 0 70px;
  position:relative;
  overflow:hidden;
  background:#e62233;
  transform-origin:center center;
}
/* 陰面 = 第一張圖：帶左上白色月牙、外層柔光暈 */
.cup-yin{
  box-shadow:0 0 14px #e622337f;
}
.cup-yin::after{
  content:"";
  position:absolute;
  left:14%;
  top:16%;
  width:62%;
  height:38%;
  border-radius:100px;
  background:#ffffff;
  clip-path:ellipse();
  transform:rotate(-12deg);
}
/* 陽面 = 第二張圖：純紅無月牙、右側立體陰影 */
.cup-yang{
  box-shadow:16px 0 16px -6px #9015228c;
}
/* 3D翻轉拋擲動畫 */
.throw-animate{
  animation:cupFlip 0.7s cubic-bezier(0.26,0.46,0.44,0.95);
}
@keyframes cupFlip{
  0%{transform:translateY(0) rotateY(0deg)}
  25%{transform:translateY(-36px) rotateY(75deg) rotate(12deg)}
  50%{transform:translateY(14px) rotateY(-55deg) rotate(-10deg)}
  75%{transform:translateY(-22px) rotateY(42deg) rotate(7deg)}
  100%{transform:translateY(0) rotateY(0deg)}
}
.btns button{
  padding:13px 34px;
  font-size:17px;
  margin:0 10px;
  border:none;
  border-radius:9px;
  cursor:pointer;
  transition:0.2s ease;
}
#throwBtn{
  background:#d38f1f;
  color:#1a0e05;
  font-weight:bold;
}
#throwBtn:active{transform:scale(0.96)}
#resetBtn{
  background:#6b341d;
  color:#fff;
}
#resetBtn:active{transform:scale(0.96)}
.result-block{
  margin-top:35px;
  padding:24px;
  border:1px solid #ffd67060;
  border-radius:12px;
}
.res-title{
  font-size:26px;
  color:#ffdd86;
  margin-bottom:10px;
}
.res-text{
  font-size:16px;
  line-height:1.7;
}
.count-text{
  margin-top:14px;
  color:#ffd266;
}
</style>
</head>
<body>
<h1>遊巡王爺｜線上擲聖杯</h1>
<p class="tip">心中默念向遊巡王爺所求之事，再點擊擲筊<br>一陰一陽＝聖筊｜兩陽＝笑筊｜兩陰＝陰筊</p>

<div class="cup-wrap">
  <div id="cup1" class="cup cup-yang"></div>
  <div id="cup2" class="cup cup-yang"></div>
</div>

<div class="btns">
  <button id="throwBtn">擲聖杯問遊巡王爺</button>
  <button id="resetBtn">重新重置</button>
</div>

<div class="result-block">
  <div class="res-title">等候向遊巡王爺擲筊</div>
  <div class="res-text">點按按鈕，請遊巡王爺明示吉凶</div>
  <div class="count-text"></div>
</div>

<script>
const cup1 = document.getElementById('cup1');
const cup2 = document.getElementById('cup2');
const throwBtn = document.getElementById('throwBtn');
const resetBtn = document.getElementById('resetBtn');
const resTitle = document.querySelector('.res-title');
const resText = document.querySelector('.res-text');
const countText = document.querySelector('.count-text');
let throwTotal = 0;

// 隨機規則：0=陰面(月牙圖) 1=陽面(純紅圖)
function randomSide(){
  return Math.floor(Math.random() * 2);
}

// 三種筊對應遊巡王爺解文
function getJiaoResult(a,b){
  if(a !== b){
    return {
      name:"聖筊",
      desc:"遊巡王爺應允，心中所求可行，可安心執行計畫"
    }
  }else if(a === 1 && b === 1){
    return {
      name:"笑筊",
      desc:"心意雜亂、稟述不清，請平靜心神，重新向遊巡王爺問事"
    }
  }else{
    return {
      name:"陰筊",
      desc:"遊巡王爺不允，此事不宜進行，建議暫緩、換方式再稟問"
    }
  }
}

// 擲杯邏輯
function doThrow(){
  throwBtn.disabled = true;
  throwTotal ++;
  cup1.classList.add('throw-animate');
  cup2.classList.add('throw-animate');

  setTimeout(()=>{
    let s1 = randomSide();
    let s2 = randomSide();
    // 切換陰/陽樣式對應你的兩張圖
    cup1.className = s1 === 1 ? "cup cup-yang" : "cup cup-yin";
    cup2.className = s2 === 1 ? "cup cup-yang" : "cup cup-yin";

    let jiao = getJiaoResult(s1,s2);
    resTitle.innerText = jiao.name;
    resText.innerText = jiao.desc;
    countText.innerText = `累計向遊巡王爺擲筊次數：${throwTotal}`;

    cup1.classList.remove('throw-animate');
    cup2.classList.remove('throw-animate');
    throwBtn.disabled = false;
  },700)
}

// 重置頁面
function resetAll(){
  throwTotal = 0;
  cup1.className = "cup cup-yang";
  cup2.className = "cup cup-yang";
  resTitle.innerText = "等候向遊巡王爺擲筊";
  resText.innerText = "點按按鈕，請遊巡王爺明示吉凶";
  countText.innerText = "";
}

throwBtn.addEventListener('click', doThrow);
resetBtn.addEventListener('click', resetAll);
</script>
</body>
</html>
