<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊巡王爺｜線上擲聖杯</title>
<style>
*{margin:0;padding:0;font-family:標楷體,微軟正黑體}
body{background:#2c170f;color:#fff9e8;text-align:center;padding:35px 15px}
h1{color:#ffd266;font-size:30px;letter-spacing:3px}
.tip{margin:12px 0 40px;opacity:0.9}
.cup-wrap{display:flex;gap:45px;justify-content:center;margin:50px 0;height:170px;align-items:center;perspective:800px}
/* 聖杯統一基底，尺寸弧度完全一致 */
.cup{
  width:105px;
  height:140px;
  border-radius:50% 0 0 50px;
  position:relative;
  overflow:hidden;
  background:#e62233;
  transform-origin:center center;
}
/* 反面：對應第一張圖 左側白色月牙+外發柔光 */
.cup-fan{
  box-shadow:0 0 14px #e6223380;
}
.cup-fan::after{
  content:"";
  position:absolute;
  left:14%;
  top:16%;
  width:62%;
  height:38%;
  border-radius:100px;
  background:#ffffff;
  clip-path:ellipse();
  transform:rotate(-12deg);
}
/* 正面：對應第二張圖 無月牙、右側立體陰影 */
.cup-zheng{
  box-shadow:16px 0 16px -6px #90152290;
}
/* 模仿 piliapp 立體翻轉拋擲動畫 */
.shake{
  animation:throwFlip 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes throwFlip{
  0%{transform:translateY(0) rotateY(0deg) rotate(0deg)}
  25%{transform:translateY(-35px) rotateY(70deg) rotate(12deg)}
  50%{transform:translateY(15px) rotateY(-50deg) rotate(-10deg)}
  75%{transform:translateY(-20px) rotateY(40deg) rotate(7deg)}
  100%{transform:translateY(0) rotateY(0deg) rotate(0deg)}
}
.btns button{
  padding:13px 34px;
  font-size:17px;
  margin:0 10px;
  border:none;
  border-radius:9px;
  cursor:pointer;
  transition:0.2s;
}
#throw{
  background:#d38f1f;
  color:#1a0e05;
  font-weight:bold;
}
#throw:active{transform:scale(0.96)}
#reset{
  background:#6b341d;
  color:#fff;
}
#reset:active{transform:scale(0.96)}
.result{
  margin-top:35px;
  padding:24px;
  border:1px solid #ffd67063;
  border-radius:12px;
}
.res-title{
  font-size:26px;
  color:#ffdd86;
  margin-bottom:10px;
}
.res-desc{
  font-size:16px;
  line-height:1.7;
}
.count{
  margin-top:14px;
  color:#ffd266;
}
</style>
</head>
<body>
<h1>遊巡王爺｜線上擲聖杯</h1>
<p class="tip">心中默念向遊巡王爺所求之事，再點擊擲筊<br>一正一反＝聖筊｜兩反＝陰筊｜兩正＝笑筊</p>

<div class="cup-wrap">
  <div id="c1" class="cup cup-zheng"></div>
  <div id="c2" class="cup cup-zheng"></div>
</div>

<div class="btns">
  <button id="throw">擲聖杯問遊巡王爺</button>
  <button id="reset">重新重置</button>
</div>

<div class="result">
  <div class="res-title">等候向遊巡王爺擲筊</div>
  <div class="res-desc">點按按鈕，請遊巡王爺明示吉凶</div>
  <div class="count"></div>
</div>

<script>
let c1=document.getElementById('c1'),c2=document.getElementById('c2');
let btnThrow=document.getElementById('throw'),btnReset=document.getElementById('reset');
let title=document.querySelector('.res-title'),desc=document.querySelector('.res-desc'),countText=document.querySelector('.count');
let num=0;
// 0=反面(圖一月牙款) 1=正面(圖二純紅陰影款)
function randomSide(){
  return Math.floor(Math.random()*2);
}
function getJiao(a,b){
  if(a!==b){
    return {
      name:"聖筊",
      text:"遊巡王爺應允，心中所求可行，可安心執行"
    };
  }else if(a===0&&b===0){
    return {
      name:"陰筊",
      text:"遊巡王爺不允，此事不宜進行，建議暫緩、換方式再稟問"
    };
  }else{
    return {
      name:"笑筊",
      text:"心意雜亂、稟述不清，請平靜心神重新向王爺問事"
    };
  }
}
function throwCup(){
  btnThrow.disabled=true;
  num++;
  c1.classList.add('shake');
  c2.classList.add('shake');
  setTimeout(()=>{
    let s1=randomSide(),s2=randomSide();
    c1.className = s1 ? "cup cup-zheng" : "cup cup-fan";
    c2.className = s2 ? "cup cup-zheng" : "cup cup-fan";
    let res=getJiao(s1,s2);
    title.innerText=res.name;
    desc.innerText=res.text;
    countText.innerText=`累計向遊巡王爺擲筊次數：${num}`;
    c1.classList.remove('shake');
    c2.classList.remove('shake');
    btnThrow.disabled=false;
  },700);
}
function resetAll(){
  num=0;
  c1.className="cup cup-zheng";
  c2.className="cup cup-zheng";
  title.innerText='等候向遊巡王爺擲筊';
  desc.innerText='點按按鈕，請遊巡王爺明示吉凶';
  countText.innerText='';
}
btnThrow.onclick=throwCup;
btnReset.onclick=resetAll;
</script>
</body>
</html>
