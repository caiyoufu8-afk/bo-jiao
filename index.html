<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊巡王爺｜線上擲聖杯</title>
<style>
*{
  margin:0;
  padding:0;
  font-family:標楷體,微軟正黑體;
  box-sizing:border-box;
}
body{
  background:#2c170f;
  color:#fff9e8;
  text-align:center;
  padding:35px 15px;
}
h1{
  color:#ffd266;
  font-size:30px;
  letter-spacing:3px;
}
.tip{
  margin:12px 0 40px;
  opacity:0.9;
  line-height:1.6;
}
.cup-wrap{
  display:flex;
  gap:30px;
  justify-content:center;
  margin:50px 0;
  height:180px;
  align-items:center;
  perspective:900px;
}
/* 筊杯基底：左右對稱半月形，完全匹配你的圖輪廓 */
.cup{
  width:130px;
  height:130px;
  position:relative;
  transform-origin:center center;
}
.cup-left{
  border-radius:0 70px 70px 0;
  background:#e62233;
}
.cup-right{
  border-radius:70px 0 0 70px;
  background:#e62233;
}
/* 陽面（笑杯專用：無月牙、單側陰影 對應圖一） */
.yang{
  box-shadow:14px 0 16px -4px #9118248c;
}
/* 陰面（陰杯專用：帶白色月牙、外發柔光 對應圖二） */
.yin{
  box-shadow:0 0 14px #e622337f;
}
.yin::after{
  content:"";
  position:absolute;
  width:62%;
  height:38%;
  border-radius:100px;
  background:#ffffff;
  clip-path:ellipse();
}
.cup-left.yin::after{
  left:16%;
  top:18%;
  transform:rotate(-12deg);
}
.cup-right.yin::after{
  right:16%;
  top:18%;
  transform:rotate(12deg);
}
/* 3D翻轉拋擲動畫 */
.throw-animate{
  animation:cupFlip 0.7s cubic-bezier(0.26,0.46,0.44,0.95);
}
@keyframes cupFlip{
  0%{transform:translateY(0) rotateY(0deg)}
  25%{transform:translateY(-36px) rotateY(75deg) rotate(12deg)}
  50%{transform:translateY(14px) rotateY(-55deg) rotate(-10deg)}
  75%{transform:translateY(-22px) rotateY(42deg) rotate(7deg)}
  100%{transform:translateY(0) rotateY(0deg)}
}
.btns{
  margin-top:30px;
}
.btns button{
  padding:13px 34px;
  font-size:17px;
  margin:0 10px;
  border:none;
  border-radius:9px;
  cursor:pointer;
  transition:0.2s ease;
}
#throwBtn{
  background:#d38f1f;
  color:#1a0e05;
  font-weight:bold;
}
#throwBtn:active{transform:scale(0.96)}
#resetBtn{
  background:#6b341d;
  color:#fff;
}
#resetBtn:active{transform:scale(0.96)}
.result-block{
  margin-top:35px;
  padding:24px;
  border:1px solid #ffd67060;
  border-radius:12px;
}
.res-title{
  font-size:26px;
  color:#ffdd86;
  margin-bottom:10px;
}
.res-text{
  font-size:16px;
  line-height:1.7;
}
.count-text{
  margin-top:14px;
  color:#ffd266;
}
/* 手機自適應 */
@media(max-width:480px){
  .cup-wrap{
    gap:20px;
    height:150px;
  }
  .cup{
    width:100px;
    height:100px;
  }
  h1{
    font-size:24px;
  }
  .btns button{
    margin:8px;
    padding:12px 24px;
    font-size:16px;
  }
}
</style>
</head>
<body>
<h1>遊巡王爺｜線上擲聖杯</h1>
<p class="tip">心中默念向遊巡王爺所求之事，再點擊擲筊<br>一陰一陽＝聖筊｜兩陽＝笑筊｜兩陰＝陰筊</p>

<div class="cup-wrap">
  <div id="cup1" class="cup cup-left yang"></div>
  <div id="cup2" class="cup cup-right yang"></div>
</div>

<div class="btns">
  <button id="throwBtn">擲聖杯問遊巡王爺</button>
  <button id="resetBtn">重新重置</button>
</div>

<div class="result-block">
  <div class="res-title">等候向遊巡王爺擲筊</div>
  <div class="res-text">點按按鈕，請遊巡王爺明示吉凶</div>
  <div class="count-text"></div>
</div>

<script>
const cup1 = document.getElementById('cup1');
const cup2 = document.getElementById('cup2');
const throwBtn = document.getElementById('throwBtn');
const resetBtn = document.getElementById('resetBtn');
const resTitle = document.querySelector('.res-title');
const resText = document.querySelector('.res-text');
const countText = document.querySelector('.count-text');
let throwTotal = 0;

// 0=陰面(帶月牙) 1=陽面(無月牙)
function randomSide(){
  return Math.floor(Math.random() * 2);
}

// 三種筊判定規則
function getJiaoResult(a,b){
  if(a !== b){
    return {
      name:"聖筊",
      desc:"遊巡王爺應允，心中所求可行，可安心執行計畫"
    };
  }else if(a === 1 && b === 1){
    return {
      name:"笑筊",
      desc:"心意雜亂、稟述不清，請平靜心神，重新向遊巡王爺問事"
    };
  }else{
    return {
      name:"陰筊",
      desc:"遊巡王爺不允，此事不宜進行，建議暫緩、換方式再稟問"
    };
  }
}

// 更新左右筊杯樣式
function setCupStyle(el, side, dirClass){
  el.className = "cup " + dirClass;
  if(side === 1){
    el.classList.add("yang");
  }else{
    el.classList.add("yin");
  }
}

// 擲杯動作
function doThrow(){
  throwBtn.disabled = true;
  throwTotal++;
  cup1.classList.add('throw-animate');
  cup2.classList.add('throw-animate');

  setTimeout(()=>{
    let s1 = randomSide();
    let s2 = randomSide();
    setCupStyle(cup1, s1, "cup-left");
    setCupStyle(cup2, s2, "cup-right");

    let jiao = getJiaoResult(s1, s2);
    resTitle.innerText = jiao.name;
    resText.innerText = jiao.desc;
    countText.innerText = `累計向遊巡王爺擲筊次數：${throwTotal}`;

    cup1.classList.remove('throw-animate');
    cup2.classList.remove('throw-animate');
    throwBtn.disabled = false;
  },700);
}

// 重置頁面
function resetAll(){
  throwTotal = 0;
  setCupStyle(cup1, 1, "cup-left");
  setCupStyle(cup2, 1, "cup-right");
  resTitle.innerText = "等候向遊巡王爺擲筊";
  resText.innerText = "點按按鈕，請遊巡王爺明示吉凶";
  countText.innerText = "";
}

throwBtn.addEventListener('click', doThrow);
resetBtn.addEventListener('click', resetAll);
</script>
</body>
</html>
